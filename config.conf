# SimX 配置文件
# 日志配置
log_level=info
log_file=logs/simx.log
log_max_size=10MB
log_rotation=hourly

# 模拟器配置
simulation_time=1000
time_step=0.01
output_format=csv

# 传感器配置
accelerometer_enabled=true
gyroscope_enabled=true
magnetometer_enabled=false

# 网络配置
server_port=8080
max_connections=100
timeout=30

# 调试配置
debug_mode=false
verbose_output=true
save_debug_info=false








